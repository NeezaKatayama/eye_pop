<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eye Signal Media Art</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./p5.min.js"></script>
    <script defer src="./art.js"></script>
  </head>
  <body>
    <div class="app-shell art-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Signal Translation Chamber</p>
          <h1>EYE SIGNAL MEDIA ART</h1>
        </div>
        <div class="topbar-meta">
          <span class="status-pill status-idle">P5 IMMERSIVE MODE</span>
          <a class="launch-button report-button" href="./report.html">Back To Report</a>
        </div>
      </header>

      <main class="art-layout">
        <section class="art-stage card">
          <div id="artCanvasMount"></div>
          <div class="art-overlay-copy">
            <div class="card-label">Translation Note</div>
            <p class="summary-text">
              一度保存した目の情報を、中心核、視線シャッター、破断ハロー、対称格子、ドリフト軸へ
              変換した p5 主体のメディアアートです。色は使わず、黒地に白線だけで眼の状態を翻訳します。
            </p>
          </div>
        </section>

        <section class="art-panels">
          <section class="card">
            <div class="card-label">Signal Palette</div>
            <div id="artSignalList" class="forecast-list"></div>
          </section>

          <section class="card">
            <div class="card-label">Artwork Reading</div>
            <div id="artReadingList" class="forecast-list"></div>
          </section>
        </section>
      </main>
    </div>
  </body>
  </html>
